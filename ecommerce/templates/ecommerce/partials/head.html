    <style>
        .search-form {
            border: .2rem solid black;
            max-width: 64rem;
            margin: 0 auto;
            border-radius: 7px;
            position: relative;
            transition: all 300ms ease-in-out;
        }

        .search-input,
        .search-button {
            border: none;
            background: none;
            outline: none;
            padding: 7px;
            transition: all 300ms ease-in-out;
        }

        .search-input {
            width: 100%;
            padding-right: 3rem;
        }

        .search-button:focus {
            outline: 1px solid rgb(6, 8, 44);
            background: rgba(0, 0, 0, .05);
        }

        .search-button {
            position: absolute;
            top: 0;
            right: 2px;
        }

        .search-form:focus-within {
            border-color: rgb(6, 8, 44);
            background-color: white;
        }

        .search-form:focus-within .search-button {
            color: rgb(6, 8, 44);
        }
    </style>
